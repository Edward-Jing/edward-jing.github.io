  </head>
  <body data-page="gallery">
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="site-header" data-header>
      <a class="wordmark" href="/"><span>Jingzhi Sun</span></a>
      <nav class="site-nav" aria-label="Main navigation">
        <a data-page="about" href="/">About</a>
        <a data-page="research" href="/research.html">Research</a>
        <a data-page="map" href="/map.html">Map</a>

        <a data-page="dota" href="/dota2.html">Dota2</a>
      </nav>
    </header>

    <main id="main" class="page-main">
      <section class="page-hero section-band">
        <p class="eyebrow">Gallery</p>
        <h1>Painted miniatures and model kits</h1>
      </section>

      <section class="section-band gallery-band">
        <div class="section-heading gallery-heading">
          <div>
            <p class="eyebrow">Workshop</p>
            <h2>Model and miniature log</h2>
          </div>
          <div class="filter-bar" aria-label="Gallery filters">
            <button type="button" class="filter-button active" data-filter="all">All</button>
            <button type="button" class="filter-button" data-filter="warhammer">Warhammer</button>
            <button type="button" class="filter-button" data-filter="model-kit">Model Kits</button>
            <button type="button" class="filter-button" data-filter="miniature">Miniatures</button>
          </div>
        </div>

        <div class="gallery-grid" data-gallery>
          <button class="gallery-item wide" type="button" data-category="warhammer" data-title="Warhammer 40K: Ultramarines Captain Sicarius" data-caption="A painted Ultramarines character model with blue armor and display basing.">
            <img src="/images/hobbies/战锤 极限战士 西卡留斯.jpg" alt="Warhammer 40K Ultramarines Captain Sicarius miniature">
          </button>
          <button class="gallery-item tall" type="button" data-category="model-kit" data-title="Kotobukiya Megami Device: Amaterasu" data-caption="A character model kit from Kotobukiya's Megami Device line.">
            <img src="/images/hobbies/寿屋 女神装置 天照.jpg" alt="Kotobukiya Megami Device Amaterasu model kit">
          </button>
          <button class="gallery-item" type="button" data-category="miniature" data-title="Miniature Wolf Study" data-caption="Small animal miniatures with scenic basing and texture work.">
            <img src="/images/hobbies/微缩模型 狼.jpg" alt="Painted miniature wolves">
          </button>
          <button class="gallery-item" type="button" data-category="miniature" data-title="Amuro Ray Figure" data-caption="A small character figure painted at miniature scale.">
            <img src="/images/hobbies/阿姆罗.jpg" alt="Painted Amuro Ray miniature figure">
          </button>
          <button class="gallery-item tall" type="button" data-category="model-kit" data-title="EVA Model Kit" data-caption="A posed EVA model kit with translucent effect parts.">
            <img src="/images/hobbies/EVA.jpg" alt="EVA model kit with effect parts">
          </button>
          <button class="gallery-item" type="button" data-category="miniature" data-title="Amuro Ray Figure Set" data-caption="A small set of Amuro Ray figures stored after painting.">
            <img src="/images/hobbies/阿姆罗 set.jpg" alt="Set of small Amuro Ray figures">
          </button>
          <button class="gallery-item" type="button" data-category="miniature" data-title="D&D Demon Miniature" data-caption="A fantasy demon miniature with wing and color detail.">
            <img src="/images/hobbies/DND 恶魔.jpg" alt="Painted Dungeons and Dragons demon miniature">
          </button>
          <button class="gallery-item wide" type="button" data-category="warhammer" data-title="Warhammer 40K: Deathwatch Phobos Scout" data-caption="A Deathwatch Phobos-armored scout with weathered black armor.">
            <img src="/images/hobbies/战锤 死亡守望 福波斯甲斥候.jpg" alt="Warhammer 40K Deathwatch Phobos scout miniature">
          </button>
          <button class="gallery-item" type="button" data-category="warhammer" data-title="Warhammer 40K: Deathwatch Kill Team" data-caption="Deathwatch infantry painted for a compact kill team display.">
            <img src="/images/hobbies/战锤 死亡守望.jpg" alt="Warhammer 40K Deathwatch miniature">
          </button>
          <button class="gallery-item" type="button" data-category="model-kit" data-title="Crossbone Gundam" data-caption="A Gundam model kit with a sharp silhouette and mechanical detail.">
            <img src="/images/hobbies/海盗高达.jpg" alt="Crossbone Gundam model kit">
          </button>
          <button class="gallery-item wide" type="button" data-category="model-kit" data-title="Nu Gundam Base Limited" data-caption="A Nu Gundam Base Limited kit staged as a finished display model.">
            <img src="/images/hobbies/nu高达 基地限定.jpg" alt="Nu Gundam Base Limited model kit">
          </button>
        </div>
      </section>
    </main>

    <div class="lightbox" data-lightbox hidden>
      <button class="lightbox-close" type="button" aria-label="Close image preview">Close</button>
      <img alt="">

        <strong></strong>
        <span></span>
      </div>

    <footer class="site-footer">
      <span>Jingzhi Sun</span>
